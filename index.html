<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ZenReader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --font-size: 18px;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        #brightness-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
        }

        #reader-container {
            width: 100vw;
            height: 100vh;
            padding: calc(env(safe-area-inset-top) + 1.5em) 24px calc(env(safe-area-inset-bottom) + 1.5em);
            box-sizing: border-box;
            line-height: 1.8;
            font-size: var(--font-size);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: justify;
        }

        #content-area {
            flex: 1;
            white-space: pre-wrap;
            word-break: break-all;
        }

        #touch-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            display: flex;
        }
        .touch-left { width: 30%; }
        .touch-center { width: 40%; }
        .touch-right { width: 30%; }

        .panel {
            position: fixed;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #333;
        }

        #top-bar {
            top: 0;
            height: calc(env(safe-area-inset-top) + 50px);
            padding-top: env(safe-area-inset-top);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 20px;
            padding-right: 20px;
            transform: translateY(-100%);
            border-bottom: 1px solid #eee;
        }

        #bottom-menu {
            bottom: 0;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px 20px calc(env(safe-area-inset-bottom) + 20px);
            transform: translateY(100%);
            border-top: 1px solid #eee;
        }

        .panel.show { transform: translateY(0); }

        #library-view {
            position: fixed;
            inset: 0;
            background: #f8f9fa;
            z-index: 200;
            overflow-y: auto;
            padding: calc(env(safe-area-inset-top) + 20px) 20px;
            color: #333;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #007aff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .theme-light { --bg-color: #ffffff; --text-color: #1a1a1a; }
        .theme-sepia { --bg-color: #F5F5DC; --text-color: #433422; }
        .theme-dark  { --bg-color: #1A1A1A; --text-color: #d1d1d1; }

        .hidden { display: none !important; }

        /* AI 助手弹窗 */
        #ai-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #ai-content {
            background: white;
            width: 100%;
            max-width: 500px;
            max-height: 70vh;
            border-radius: 20px;
            padding: 24px;
            overflow-y: auto;
            position: relative;
        }

        /* 动画效果 */
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="theme-light">

<div id="brightness-overlay"></div>

<!-- 书架界面 -->
<div id="library-view">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">ZenReader</h1>
        <label class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-medium">
            导入新书
            <input type="file" id="file-input" accept=".txt" class="hidden">
        </label>
    </div>
    <div id="book-list" class="grid gap-4"></div>
</div>

<!-- 阅读热区 -->
<div id="touch-layer">
    <div class="touch-left" id="prev-btn"></div>
    <div class="touch-center" id="menu-btn"></div>
    <div class="touch-right" id="next-btn"></div>
</div>

<!-- 阅读器主容器 -->
<div id="reader-container">
    <div id="content-area"></div>
</div>

<!-- 顶部菜单 -->
<div id="top-bar" class="panel">
    <button id="back-to-lib" class="text-blue-600 font-medium">✕ 返回书架</button>
    <div id="book-title" class="truncate max-w-[150px] text-sm font-bold"></div>
    <button id="ai-quick-btn" class="text-xl">✨</button>
</div>

<!-- 底部菜单控制中心 -->
<div id="bottom-menu" class="panel">
    <!-- AI 功能区 -->
    <div class="mb-6 bg-blue-50 p-4 rounded-2xl">
        <div class="text-xs font-bold text-blue-600 mb-3 uppercase tracking-wider">Gemini AI 阅读助手</div>
        <div class="flex gap-2 overflow-x-auto pb-1">
            <button onclick="aiAction('summarize')" class="flex-shrink-0 bg-white border border-blue-200 px-4 py-2 rounded-xl text-sm font-medium shadow-sm active:scale-95 transition-all">✨ 生成摘要</button>
            <button onclick="aiAction('explain')" class="flex-shrink-0 bg-white border border-blue-200 px-4 py-2 rounded-xl text-sm font-medium shadow-sm active:scale-95 transition-all">✨ 难点解析</button>
            <button onclick="aiAction('tts')" class="flex-shrink-0 bg-white border border-blue-200 px-4 py-2 rounded-xl text-sm font-medium shadow-sm active:scale-95 transition-all">✨ 语音朗读</button>
        </div>
    </div>

    <!-- 进度条 -->
    <div class="mb-6">
        <div class="flex justify-between text-xs mb-2 text-gray-500">
            <span>进度跳转</span>
            <span id="progress-percent">0.0%</span>
        </div>
        <input type="range" id="progress-bar" min="0" max="100" step="0.1" value="0">
    </div>

    <!-- 字体与亮度 -->
    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-4">
            <button id="font-dec" class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center">A-</button>
            <button id="font-inc" class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center">A+</button>
        </div>
        <div class="flex-1 px-8">
            <input type="range" id="brightness-slider" min="0" max="0.8" step="0.01" value="0" style="direction: rtl;">
        </div>
    </div>

    <!-- 主题切换 -->
    <div class="flex justify-around">
        <button data-theme="light" class="w-12 h-12 rounded-full border-2 border-gray-200 bg-white"></button>
        <button data-theme="sepia" class="w-12 h-12 rounded-full border-2 border-gray-200 bg-[#F5F5DC]"></button>
        <button data-theme="dark" class="w-12 h-12 rounded-full border-2 border-gray-200 bg-[#1A1A1A]"></button>
    </div>
</div>

<!-- AI 弹窗 -->
<div id="ai-modal" class="hidden">
    <div id="ai-content">
        <div class="flex justify-between items-center mb-4">
            <h3 id="ai-modal-title" class="font-bold text-lg text-blue-600">AI 助手</h3>
            <button onclick="closeAI()" class="text-gray-400 text-xl">✕</button>
        </div>
        <div id="ai-text" class="text-sm leading-relaxed text-gray-700 min-h-[100px]">
            <!-- 内容由 AI 生成 -->
        </div>
    </div>
</div>

<script>
/**
 * 配置与状态
 */
const apiKey = ""; // 运行时自动提供
const appId = typeof __app_id !== 'undefined' ? __app_id : 'zen-reader-v2';

const state = {
    currentBook: null,
    offset: 0,
    fontSize: 18,
    fullText: "",
    pageSize: 0,
    isSpeaking: false
};

/**
 * Gemini API 工具集
 */
async function callGemini(prompt, systemPrompt = "你是一个专业的阅读助手。") {
    let retries = 0;
    const maxRetries = 5;
    
    while (retries <= maxRetries) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                })
            });
            
            if (!response.ok) throw new Error('API Request Failed');
            
            const result = await response.json();
            return result.candidates?.[0]?.content?.parts?.[0]?.text || "未能生成内容";
        } catch (error) {
            if (retries === maxRetries) throw error;
            const delay = Math.pow(2, retries) * 1000;
            await new Promise(r => setTimeout(r, delay));
            retries++;
        }
    }
}

async function generateTTS(text) {
    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `请平稳且富有感情地朗读以下内容：${text}` }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                },
                model: "gemini-2.5-flash-preview-tts"
            })
        });

        const result = await response.json();
        const base64Audio = result.candidates[0].content.parts[0].inlineData.data;
        const audioBlob = pcmToWavBlob(base64Audio, 24000); // 假设采样率 24k
        return URL.createObjectURL(audioBlob);
    } catch (error) {
        console.error("TTS Failed", error);
        return null;
    }
}

// 辅助：PCM16 转 WAV
function pcmToWavBlob(base64Data, sampleRate) {
    const binaryString = window.atob(base64Data);
    const len = binaryString.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
    
    const wavHeader = new ArrayBuffer(44);
    const view = new DataView(wavHeader);
    
    const writeString = (offset, string) => {
        for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
    };

    writeString(0, 'RIFF');
    view.setUint32(4, 36 + len, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeString(36, 'data');
    view.setUint32(40, len, true);

    return new Blob([wavHeader, bytes], { type: 'audio/wav' });
}

/**
 * AI 动作处理器
 */
async function aiAction(type) {
    const currentText = document.getElementById('content-area').innerText;
    if (!currentText) return;

    showAIModal(type);
    
    try {
        if (type === 'summarize') {
            const summary = await callGemini(`请简洁地总结以下阅读内容的主要情节（约200字）：\n\n${currentText}`);
            document.getElementById('ai-text').innerText = summary;
        } else if (type === 'explain') {
            const explanation = await callGemini(`请分析以下文本中的难理解的词汇、文学修辞或背景知识：\n\n${currentText}`);
            document.getElementById('ai-text').innerText = explanation;
        } else if (type === 'tts') {
            document.getElementById('ai-text').innerHTML = `<div class="flex flex-col items-center justify-center p-8">
                <div class="text-4xl mb-4 animate-bounce">🎙️</div>
                <div>正在合成 AI 语音...</div>
            </div>`;
            const audioUrl = await generateTTS(currentText.substring(0, 500)); // 限制字符防止过长
            if (audioUrl) {
                const audio = new Audio(audioUrl);
                document.getElementById('ai-text').innerHTML = `<div class="flex flex-col items-center justify-center p-8">
                    <button id="play-pause-tts" class="bg-blue-600 text-white w-16 h-16 rounded-full text-2xl shadow-lg">▶️</button>
                    <div class="mt-4">AI 语音已准备就绪</div>
                </div>`;
                const btn = document.getElementById('play-pause-tts');
                btn.onclick = () => {
                    if (audio.paused) { audio.play(); btn.innerText = "⏸️"; }
                    else { audio.pause(); btn.innerText = "▶️"; }
                };
            } else {
                document.getElementById('ai-text').innerText = "语音合成失败，请稍后重试。";
            }
        }
    } catch (e) {
        document.getElementById('ai-text').innerText = "AI 助手暂时无法响应，请检查网络。";
    }
}

function showAIModal(type) {
    const titles = { summarize: "✨ 章节摘要", explain: "✨ 难点解析", tts: "✨ 语音朗读" };
    document.getElementById('ai-modal-title').innerText = titles[type] || "AI 助手";
    document.getElementById('ai-text').innerHTML = `<div class="w-full h-4 loading-shimmer rounded mb-2"></div><div class="w-3/4 h-4 loading-shimmer rounded mb-2"></div><div class="w-1/2 h-4 loading-shimmer rounded"></div>`;
    document.getElementById('ai-modal').classList.remove('hidden');
}

function closeAI() {
    document.getElementById('ai-modal').classList.add('hidden');
}

/**
 * 原有 DB & 渲染逻辑
 */
const DB_NAME = 'ZenReaderDB';
const DB_VERSION = 1;
let db;

async function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('books')) {
                db.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
            }
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(db); };
        request.onerror = e => reject(e);
    });
}

const Store = {
    async add(book) {
        return new Promise(res => {
            const tx = db.transaction('books', 'readwrite');
            tx.objectStore('books').add(book).onsuccess = e => res(e.target.result);
        });
    },
    async getAll() {
        return new Promise(res => {
            const tx = db.transaction('books', 'readonly');
            tx.objectStore('books').getAll().onsuccess = e => res(e.target.result);
        });
    },
    async update(book) {
        return new Promise(res => {
            const tx = db.transaction('books', 'readwrite');
            tx.objectStore('books').put(book).onsuccess = () => res();
        });
    },
    async get(id) {
        return new Promise(res => {
            const tx = db.transaction('books', 'readonly');
            tx.objectStore('books').get(id).onsuccess = e => res(e.target.result);
        });
    }
};

const UI = {
    lib: document.getElementById('library-view'),
    bookList: document.getElementById('book-list'),
    reader: document.getElementById('reader-container'),
    content: document.getElementById('content-area'),
    topBar: document.getElementById('top-bar'),
    bottomMenu: document.getElementById('bottom-menu'),
    progress: document.getElementById('progress-bar'),
    percentTxt: document.getElementById('progress-percent'),
    title: document.getElementById('book-title'),
    brightnessOverlay: document.getElementById('brightness-overlay')
};

window.onload = async () => {
    await initDB();
    renderLibrary();
    const lastId = localStorage.getItem('lastBookId');
    if (lastId) openBook(parseInt(lastId));
};

async function renderLibrary() {
    const books = await Store.getAll();
    UI.bookList.innerHTML = books.map(book => `
        <div onclick="openBook(${book.id})" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 active:scale-95 transition-transform flex justify-between items-center">
            <div class="flex-1">
                <div class="font-bold text-lg mb-1">${book.name}</div>
                <div class="text-xs text-gray-400">阅读进度: ${((book.offset / (book.content.length || 1)) * 100).toFixed(1)}%</div>
            </div>
            <div class="w-12 h-12 rounded-full border-4 border-blue-100 flex items-center justify-center text-[10px] font-bold text-blue-500">
                ${Math.floor((book.offset / (book.content.length || 1)) * 100)}%
            </div>
        </div>
    `).join('');
}

document.getElementById('file-input').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const readAsText = (blob, encoding) => new Promise(res => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result);
        reader.readAsText(blob, encoding);
    });

    let content = await readAsText(file, 'utf-8');
    if (content.includes('')) content = await readAsText(file, 'gbk');

    const newBook = { name: file.name.replace('.txt', ''), content, offset: 0, lastRead: Date.now() };
    const id = await Store.add(newBook);
    renderLibrary();
    openBook(id);
};

async function openBook(id) {
    const book = await Store.get(id);
    if (!book) return;
    state.currentBook = book;
    state.offset = book.offset || 0;
    state.fullText = book.content;
    UI.title.innerText = book.name;
    UI.lib.classList.add('hidden');
    localStorage.setItem('lastBookId', id);
    renderPage();
}

function renderPage() {
    if (!state.fullText) return;
    const containerHeight = UI.content.clientHeight;
    UI.content.style.fontSize = state.fontSize + 'px';
    
    let testText = state.fullText.substring(state.offset, state.offset + 2500);
    UI.content.innerText = testText;
    
    if (UI.content.scrollHeight > containerHeight) {
        let l = 0, r = testText.length;
        let end = state.offset;
        while(l <= r) {
            let m = Math.floor((l+r)/2);
            UI.content.innerText = testText.substring(0, m);
            if(UI.content.scrollHeight <= containerHeight) { end = state.offset + m; l = m + 1; } 
            else { r = m - 1; }
        }
        state.pageSize = end - state.offset;
    } else {
        state.pageSize = testText.length;
    }
    
    UI.content.innerText = state.fullText.substring(state.offset, state.offset + state.pageSize);
    updateProgressUI();
}

function updateProgressUI() {
    const total = state.fullText.length || 1;
    const percent = (state.offset / total) * 100;
    UI.progress.value = percent;
    UI.percentTxt.innerText = percent.toFixed(1) + '%';
    if (state.currentBook) {
        state.currentBook.offset = state.offset;
        Store.update(state.currentBook);
    }
}

// 翻页
document.getElementById('next-btn').onclick = () => {
    if (state.offset + state.pageSize >= state.fullText.length) return;
    state.offset += state.pageSize;
    renderPage();
};
document.getElementById('prev-btn').onclick = () => {
    state.offset = Math.max(0, state.offset - state.pageSize);
    renderPage();
};

// UI 交互
document.getElementById('menu-btn').onclick = () => {
    const isShowing = UI.bottomMenu.classList.contains('show');
    UI.topBar.classList.toggle('show', !isShowing);
    UI.bottomMenu.classList.toggle('show', !isShowing);
};

document.getElementById('back-to-lib').onclick = () => {
    UI.lib.classList.remove('hidden');
    UI.topBar.classList.remove('show');
    UI.bottomMenu.classList.remove('show');
    localStorage.removeItem('lastBookId');
    renderLibrary();
};

document.getElementById('font-inc').onclick = () => { state.fontSize += 2; renderPage(); };
document.getElementById('font-dec').onclick = () => { state.fontSize -= 2; renderPage(); };
document.getElementById('brightness-slider').oninput = (e) => UI.brightnessOverlay.style.opacity = e.target.value;
document.querySelectorAll('[data-theme]').forEach(btn => btn.onclick = () => document.body.className = 'theme-' + btn.dataset.theme);
UI.progress.oninput = (e) => UI.percentTxt.innerText = parseFloat(e.target.value).toFixed(1) + '%';
UI.progress.onchange = (e) => { state.offset = Math.floor(state.fullText.length * (parseFloat(e.target.value) / 100)); renderPage(); };

window.onresize = renderPage;
</script>
</body>
</html>
